<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1A1A"/>
  <!-- Container body (wide tub) -->
  <rect x="58" y="62" width="84" height="70" rx="8" fill="#FF9800"/>
  <!-- Container highlight -->
  <rect x="62" y="66" width="20" height="60" rx="5" fill="#FFD700" opacity="0.25"/>
  <!-- Lid -->
  <rect x="54" y="50" width="92" height="16" rx="7" fill="#FFC107"/>
  <rect x="58" y="52" width="30" height="6" rx="3" fill="#FFD700" opacity="0.4"/>
  <!-- Label -->
  <rect x="70" y="78" width="60" height="32" rx="4" fill="rgba(26,26,26,0.4)"/>
  <line x1="78" y1="88" x2="122" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="78" y1="94" x2="116" y2="94" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="78" y1="100" x2="108" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <!-- Scoop with powder -->
  <path d="M118 130 Q110 118 102 118 Q94 118 86 130Z" fill="#FFD700" opacity="0.7"/>
  <!-- Scoop handle -->
  <rect x="114" y="124" width="26" height="4" rx="2" fill="rgba(255,255,255,0.15)" transform="rotate(-25, 127, 126)"/>
  <!-- Powder particles floating -->
  <circle cx="76" cy="142" r="1.5" fill="#FFC107" opacity="0.3"/>
  <circle cx="84" cy="138" r="1" fill="#FFD700" opacity="0.25"/>
  <circle cx="96" cy="145" r="1.2" fill="#FF9800" opacity="0.3"/>
  <circle cx="108" cy="140" r="0.8" fill="#FFC107" opacity="0.2"/>
  <!-- Product name -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.72)">Collagen Powder</text>
</svg>