<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1A1A"/>
  <!-- Wide jar body -->
  <rect x="48" y="72" width="104" height="56" rx="10" fill="#FF9800"/>
  <!-- Jar highlight -->
  <rect x="52" y="76" width="24" height="46" rx="6" fill="#FFD700" opacity="0.25"/>
  <!-- Lid -->
  <rect x="44" y="58" width="112" height="18" rx="8" fill="#FFC107"/>
  <!-- Lid highlight -->
  <rect x="48" y="60" width="36" height="8" rx="4" fill="#FFD700" opacity="0.35"/>
  <!-- Label -->
  <rect x="66" y="84" width="68" height="28" rx="4" fill="rgba(26,26,26,0.4)"/>
  <!-- Label text lines -->
  <line x1="74" y1="94" x2="126" y2="94" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="74" y1="100" x2="118" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="74" y1="106" x2="108" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <!-- Small leaf decoration -->
  <path d="M138 46 Q148 38 156 44 Q150 52 138 46Z" fill="#FFD700" opacity="0.4"/>
  <path d="M140 48 Q146 42 152 46" fill="none" stroke="#FF9800" stroke-width="0.6" opacity="0.5"/>
  <path d="M128 42 Q136 32 144 38 Q138 46 128 42Z" fill="#FFC107" opacity="0.35"/>
  <!-- Bottom rim -->
  <rect x="50" y="124" width="100" height="6" rx="3" fill="#CC7A00" opacity="0.5"/>
  <!-- Product name -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.72)">Tropical Body Butter</text>
</svg>