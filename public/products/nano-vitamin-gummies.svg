<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1A1A"/>
  <!-- Gummy bear shape (center, larger) -->
  <!-- Head -->
  <circle cx="100" cy="62" r="14" fill="#FFD700"/>
  <!-- Ears -->
  <circle cx="88" cy="52" r="6" fill="#FFD700"/>
  <circle cx="112" cy="52" r="6" fill="#FFD700"/>
  <!-- Body -->
  <ellipse cx="100" cy="88" rx="18" ry="16" fill="#FFD700"/>
  <!-- Arms -->
  <ellipse cx="78" cy="82" rx="7" ry="5" fill="#FFD700" transform="rotate(-30, 78, 82)"/>
  <ellipse cx="122" cy="82" rx="7" ry="5" fill="#FFD700" transform="rotate(30, 122, 82)"/>
  <!-- Legs -->
  <ellipse cx="90" cy="108" rx="6" ry="8" fill="#FFD700"/>
  <ellipse cx="110" cy="108" rx="6" ry="8" fill="#FFD700"/>
  <!-- Face -->
  <circle cx="94" cy="60" r="2" fill="rgba(26,26,26,0.3)"/>
  <circle cx="106" cy="60" r="2" fill="rgba(26,26,26,0.3)"/>
  <ellipse cx="100" cy="68" rx="4" ry="2" fill="rgba(26,26,26,0.15)"/>
  <!-- Bear highlight -->
  <ellipse cx="93" cy="56" rx="4" ry="6" fill="#FFE44D" opacity="0.3" transform="rotate(-10, 93, 56)"/>
  <ellipse cx="94" cy="82" rx="5" ry="8" fill="#FFE44D" opacity="0.2"/>
  <!-- Small pill shapes around -->
  <rect x="54" y="78" width="10" height="18" rx="5" fill="#FFC107" opacity="0.4"/>
  <rect x="136" y="72" width="10" height="18" rx="5" fill="#FF9800" opacity="0.4"/>
  <!-- Small gummy (left) -->
  <circle cx="60" cy="112" r="5" fill="#FFC107" opacity="0.35"/>
  <circle cx="56" cy="106" r="2.5" fill="#FFC107" opacity="0.35"/>
  <circle cx="64" cy="106" r="2.5" fill="#FFC107" opacity="0.35"/>
  <!-- Small gummy (right) -->
  <circle cx="142" cy="108" r="5" fill="#FF9800" opacity="0.35"/>
  <circle cx="138" cy="102" r="2.5" fill="#FF9800" opacity="0.35"/>
  <circle cx="146" cy="102" r="2.5" fill="#FF9800" opacity="0.35"/>
  <!-- Product name -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.72)">Nano Vitamin Gummies</text>
</svg>