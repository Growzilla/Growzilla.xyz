<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1A1A"/>
  <!-- Dropper cap -->
  <rect x="91" y="38" width="18" height="14" rx="3" fill="#FFD700"/>
  <!-- Dropper squeeze bulb -->
  <ellipse cx="100" cy="34" rx="10" ry="8" fill="#FFC107"/>
  <!-- Dropper stem -->
  <rect x="97" y="52" width="6" height="20" fill="rgba(255,255,255,0.15)"/>
  <!-- Bottle body -->
  <rect x="82" y="72" width="36" height="68" rx="6" fill="#FFD700"/>
  <!-- Bottle highlight -->
  <rect x="86" y="76" width="10" height="58" rx="4" fill="#FFE44D" opacity="0.4"/>
  <!-- Label area -->
  <rect x="86" y="92" width="28" height="20" rx="3" fill="rgba(26,26,26,0.5)"/>
  <!-- Label lines -->
  <line x1="90" y1="99" x2="110" y2="99" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="90" y1="104" x2="106" y2="104" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Drop falling -->
  <ellipse cx="100" cy="150" rx="4" ry="5" fill="#FFC107" opacity="0.6"/>
  <!-- Product name -->
  <text x="100" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.72)">Banana Bright Serum</text>
</svg>