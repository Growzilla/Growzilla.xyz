<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1A1A"/>
  <!-- Jar body -->
  <rect x="62" y="70" width="76" height="52" rx="10" fill="#FF9800"/>
  <!-- Jar highlight -->
  <rect x="66" y="74" width="20" height="42" rx="6" fill="#FFD700" opacity="0.3"/>
  <!-- Jar lid -->
  <rect x="58" y="56" width="84" height="18" rx="8" fill="#FFC107"/>
  <!-- Lid top highlight -->
  <rect x="62" y="58" width="30" height="8" rx="4" fill="#FFD700" opacity="0.4"/>
  <!-- Label on jar -->
  <rect x="76" y="82" width="48" height="24" rx="4" fill="rgba(26,26,26,0.4)"/>
  <!-- Label content -->
  <line x1="82" y1="90" x2="118" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="82" y1="96" x2="112" y2="96" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Small face mask icon above jar -->
  <ellipse cx="100" cy="40" rx="12" ry="14" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  <circle cx="95" cy="37" r="1.5" fill="#FFD700" opacity="0.5"/>
  <circle cx="105" cy="37" r="1.5" fill="#FFD700" opacity="0.5"/>
  <path d="M96 44 Q100 47 104 44" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="68" cy="135" r="2" fill="#FFC107" opacity="0.3"/>
  <circle cx="132" cy="135" r="2" fill="#FFC107" opacity="0.3"/>
  <!-- Product name -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.72)">Banana Peel Mask</text>
</svg>